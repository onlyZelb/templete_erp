spring.application.name=FinalProject

# ===============================
# DATABASE / FLYWAY CONFIG
# ===============================
# Note: 'db' is the service name defined in your docker-compose.yml
spring.datasource.url=jdbc:postgresql://localhost:5434/auth_db
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway: Automatically run migrations on startup
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# baseline-on-migrate lets Flyway work on a DB that already has tables (not managed by Flyway yet).
# baseline-version=0 means: record the baseline BEFORE V1, so V1 still runs on a fresh DB.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Let Hibernate validate that the schema matches the entities (safe, doesn't auto-create)
spring.jpa.hibernate.ddl-auto=validate

# ===============================
# JWT CONFIG
# ===============================
# This matches the @Value("${jwt.secret}") in your JwtUtils
# Use a Base64 encoded string (at least 256-bit)
jwt.secret=Zm9ydHktdHdvLWlzLXRoZS1hbnN3ZXItdG8tbGlmZS10aGUtdW5pdmVyc2UtYW5kLWV2ZXJ5dGhpbmc=
#24 hours
jwt.expiration=86400000
jwt.cookie.domain=localhost

# ===============================
# DEVTOOLS / DOCKER OPTIMIZATION
# ===============================
# Enable Hot Swapping
spring.devtools.restart.enabled=true
# Optional: Trigger restart only if a specific file changes (prevents loop)
# spring.devtools.restart.trigger-file=.trigger

# ===============================
# LOGGING (Useful for debugging JWT/Security)
# ===============================
logging.level.org.springframework.security=DEBUG
logging.level.org.flywaydb=INFO