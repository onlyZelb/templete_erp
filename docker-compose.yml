services:

  # ── Database ───────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: pasadanow_db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./php/init.sql:/docker-entrypoint-initdb.d/init.sql

  # ── API Gateway (Spring Cloud Gateway) ────────────────────────────────────
  gateway:
    image: eclipse-temurin:17-jdk-alpine
    container_name: pasadanow_gateway
    depends_on:
      - backend
      - php
      - django
    ports:
      - "8000:8000"
    environment:
      - JWT_SECRET=Zm9ydHktdHdvLWlzLXRoZS1hbnN3ZXItdG8tbGlmZS10aGUtdW5pdmVyc2UtYW5kLWV2ZXJ5dGhpbmc=
    volumes:
      - ./api-gateway:/app
      - ~/.m2:/root/.m2
    working_dir: /app
    command: ./mvnw spring-boot:run

  # ── Auth service (Spring Boot) ─────────────────────────────────────────────
  backend:
    image: eclipse-temurin:17-jdk-alpine
    container_name: pasadanow_backend
    depends_on:
      db:
        condition: service_healthy
      mongodb:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/auth_db
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=password
      - JWT_SECRET=Zm9ydHktdHdvLWlzLXRoZS1hbnN3ZXItdG8tbGlmZS10aGUtdW5pdmVyc2UtYW5kLWV2ZXJ5dGhpbmc=
      - SPRING_DEVTOOLS_RESTART_ENABLED=true
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/pasadanow_chat
    volumes:
      - ./backend:/app
      - ~/.m2:/root/.m2
    working_dir: /app
    command: ./mvnw spring-boot:run -Dspring-boot.run.jvmArguments="-Dspring.devtools.restart.enabled=false -Dspring.data.mongodb.uri=mongodb://mongodb:27017/pasadanow_chat"

  # ── Ride booking API (PHP + Composer) ──────────────────────────────────────
  php:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: php_api
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:80"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_NAME=auth_db
      - JWT_SECRET=Zm9ydHktdHdvLWlzLXRoZS1hbnN3ZXItdG8tbGlmZS10aGUtdW5pdmVyc2UtYW5kLWV2ZXJ5dGhpbmc=
    volumes:
      - ./php/src:/var/www/html/src
      - ./php/index.php:/var/www/html/index.php

  # ── Driver/Earnings/Admin API (Django) ─────────────────────────────────────
  django:
    build:
      context: ./django
      dockerfile: Dockerfile
    container_name: pasadanow_django
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8082:8000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_NAME=auth_db
      - JWT_SECRET=Zm9ydHktdHdvLWlzLXRoZS1hbnN3ZXItdG8tbGlmZS10aGUtdW5pdmVyc2UtYW5kLWV2ZXJ5dGhpbmc=
      - DJANGO_SETTINGS_MODULE=pasadanow.settings
    volumes:
      - ./django:/app
    working_dir: /app

  # ── React frontend ──────────────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: pasadanow_frontend
    depends_on:
      - gateway
    ports:
      - "3000:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"

  # ── MongoDB for chat service ────────────────────────────────────────────────
  mongodb:
    image: mongo:7-jammy
    container_name: pasadanow_mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: pasadanow_chat
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data: